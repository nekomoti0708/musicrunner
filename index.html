<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WebM Player</title>
<style>
body {
    margin: 0;
    padding: 0;
    background-color: #121212;
    color: #e0e0e0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
#initialScreen {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #121212;
}
#playerScreen {
    flex: 1;
    display: none;
    flex-direction: column;
}
#videoContainer {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #000;
}
video {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
#controls {
    flex: 0 0 auto;
    background-color: #1e1e1e;
    padding: 15px 20px;
    padding-bottom: env(safe-area-inset-bottom, 20px);
}
.progress-container {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
}
.time-display {
    font-size: 0.9rem;
    min-width: 45px;
    text-align: center;
    font-variant-numeric: tabular-nums;
}
input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    background: transparent;
    margin: 0;
}
input[type="range"]::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    background: #444;
    border-radius: 3px;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px;
    width: 18px;
    border-radius: 50%;
    background: #3f51b5;
    margin-top: -6px;
    cursor: pointer;
}
.buttons-container {
    display: flex;
    justify-content: space-around;
    align-items: center;
}
.control-btn {
    background: none;
    border: none;
    color: #e0e0e0;
    cursor: pointer;
    padding: 10px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.control-btn svg {
    width: 32px;
    height: 32px;
    fill: currentColor;
}
.play-btn svg {
    width: 48px;
    height: 48px;
}
.loop-active {
    color: #3f51b5;
}
.select-btn {
    background-color: #3f51b5;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 1.2rem;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 10px;
}
input[type="file"] {
    display: none;
}
</style>
</head>
<body>

<input type="file" id="fileInput" accept="video/webm, video/*">

<div id="initialScreen">
    <button class="select-btn" id="initialSelectBtn">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
        </svg>
        動画を選択
    </button>
</div>

<div id="playerScreen">
    <div id="videoContainer">
        <video id="videoElement" playsinline></video>
    </div>
    <div id="controls">
        <div class="progress-container">
            <span id="currentTime" class="time-display">0:00</span>
            <input type="range" id="progressBar" value="0" min="0" step="0.1">
            <span id="durationTime" class="time-display">0:00</span>
        </div>
        <div class="buttons-container">
            <button class="control-btn" id="changeVideoBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/>
                </svg>
            </button>
            <button class="control-btn play-btn" id="playPauseBtn">
                <svg id="playIcon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button class="control-btn" id="loopBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const initialScreen = document.getElementById('initialScreen');
const playerScreen = document.getElementById('playerScreen');
const video = document.getElementById('videoElement');
const playPauseBtn = document.getElementById('playPauseBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const progressBar = document.getElementById('progressBar');
const currentTimeDisplay = document.getElementById('currentTime');
const durationTimeDisplay = document.getElementById('durationTime');
const loopBtn = document.getElementById('loopBtn');
const initialSelectBtn = document.getElementById('initialSelectBtn');
const changeVideoBtn = document.getElementById('changeVideoBtn');

let isPlaying = false;

function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + ':' + String(s).padStart(2, '0');
}

function triggerFileSelect() {
    fileInput.click();
}

initialSelectBtn.addEventListener('click', triggerFileSelect);
changeVideoBtn.addEventListener('click', triggerFileSelect);

fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const fileURL = URL.createObjectURL(file);
        video.src = fileURL;
        initialScreen.style.display = 'none';
        playerScreen.style.display = 'flex';
        video.load();
        video.play().then(() => {
            isPlaying = true;
            updatePlayPauseIcon();
        }).catch(() => {
            isPlaying = false;
            updatePlayPauseIcon();
        });
    }
});

function updatePlayPauseIcon() {
    if (isPlaying) {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
    } else {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
    }
}

playPauseBtn.addEventListener('click', () => {
    if (video.paused || video.ended) {
        video.play();
        isPlaying = true;
    } else {
        video.pause();
        isPlaying = false;
    }
    updatePlayPauseIcon();
});

video.addEventListener('play', () => {
    isPlaying = true;
    updatePlayPauseIcon();
});

video.addEventListener('pause', () => {
    isPlaying = false;
    updatePlayPauseIcon();
});

video.addEventListener('loadedmetadata', () => {
    progressBar.max = video.duration;
    durationTimeDisplay.textContent = formatTime(video.duration);
});

video.addEventListener('timeupdate', () => {
    if (!progressBar.matches(':active')) {
        progressBar.value = video.currentTime;
    }
    currentTimeDisplay.textContent = formatTime(video.currentTime);
});

progressBar.addEventListener('input', () => {
    video.currentTime = progressBar.value;
    currentTimeDisplay.textContent = formatTime(video.currentTime);
});

loopBtn.addEventListener('click', () => {
    video.loop = !video.loop;
    if (video.loop) {
        loopBtn.classList.add('loop-active');
    } else {
        loopBtn.classList.remove('loop-active');
    }
});
</script>
</body>
</html>
